<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Club Lab</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:#667eea;min-height:100vh;display:flex;flex-direction:column}.header{background:rgba(0,0,0,.8);padding:20px;text-align:center;color:white}.container{max-width:800px;margin:40px auto;background:white;padding:40px;border-radius:10px}h1{color:#667eea;margin-bottom:20px}input,button{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:5px;font-size:16px}button{background:#667eea;color:white;border:none;cursor:pointer}</style></head><body><div class="header"><h2>THE CLUB LAB</h2></div><div class="container"><h1>קבע שיעור</h1><div id="form"><input type="text" id="name" placeholder="שמך"><input type="tel" id="phone" placeholder="טלפון"><input type="date" id="date"><input type="time" id="time"><button onclick="submit()">שמור</button></div></div><script>function submit(){const data={name:document.getElementById("name").value,phone:document.getElementById("phone").value,date:document.getElementById("date").value,time:document.getElementById("time").value};fetch("/api/appointments",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}).then(r=>r.json()).then(d=>{alert("נשמר!");document.getElementById("form").reset()}).catch(e=>alert("שגיאה"))}</script></body></html>
