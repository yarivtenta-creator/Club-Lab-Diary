<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Club Lab - קביעת שיעור</title><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{font-family:'Heebo',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;flex-direction:column}.navbar{background:rgba(0,0,0,.85);padding:20px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.3)}.navbar h1{color:#fff;font-size:32px;margin:0;letter-spacing:1px}.navbar p{color:#ccc;font-size:14px;margin:5px 0 0}.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}.card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.4);padding:50px;max-width:600px;width:100%}.card h2{color:#667eea;font-size:28px;margin-bottom:10px;text-align:center}.card .subtitle{color:#666;text-align:center;margin-bottom:40px;font-size:16px}.form-group{margin:20px 0}.form-group label{display:block;font-weight:700;color:#333;margin-bottom:8px}.form-group input{width:100%;padding:14px;border:2px solid #ddd;border-radius:10px;font-size:16px;font-family:'Heebo';transition:border-color .3s}.form-group input:focus{outline:0;border-color:#667eea}.step-number{display:inline-block;background:#667eea;color:#fff;width:35px;height:35px;border-radius:50%;text-align:center;line-height:35px;font-weight:700;margin-right:10px}.step-title{display:flex;align-items:center;margin-bottom:25px;font-size:18px;color:#333}.step{margin:40px 0}.button-group{display:flex;gap:12px;margin-top:25px}.btn{flex:1;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;font-family:'Heebo'}.btn-primary{background:#667eea;color:#fff}.btn-primary:hover{background:#764ba2;transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,.4)}.btn-secondary{background:#f0f0f0;color:#333}.btn-secondary:hover{background:#e0e0e0}.hidden{display:none!important}.success-box{background:#e8f5e9;border-left:4px solid #4caf50;padding:20px;border-radius:8px;margin:20px 0}.success-box p{color:#2e7d32;margin:8px 0}.footer{background:rgba(0,0,0,.7);padding:20px;text-align:center;color:#fff;font-size:13px}@media (max-width:600px){.card{padding:30px}.card h2{font-size:24px}.button-group{flex-direction:column}}</style></head><body><div class="navbar"><h1>🎧 THE CLUB LAB</h1><p>המעבדה למקצועות הקלאב</p></div><div class="main"><div class="card"><h2>קבע שיעור</h2><p class="subtitle">הכניסו פרטים וזמן שיעור — אישור יגיע לוואטסאפ</p><div id="step1Form" class="step"><div class="step-title"><span class="step-number">1</span>פרטים אישיים</div><div class="form-group"><label>שמך</label><input type="text" id="name" placeholder="הכנס את שמך"></div><div class="form-group"><label>טלפון</label><input type="tel" id="phone" placeholder="052-1234567"></div><div class="button-group"><button class="btn btn-primary" onclick="goToStep2()">המשך →</button></div></div><div id="step2Form" class="step hidden"><div class="step-title"><span class="step-number">2</span>בחר זמן שיעור</div><div class="form-group"><label>תאריך</label><input type="date" id="date"></div><div class="form-group"><label>שעה</label><input type="time" id="time"></div><div class="button-group"><button class="btn btn-secondary" onclick="backToStep1()">← חזור</button><button class="btn btn-primary" onclick="submitForm()">אשר שיעור</button></div></div><div id="successMsg" class="step hidden"><div class="success-box"><h3 style="color:#2e7d32;margin-bottom:15px">✅ בקשתך נקלטה!</h3><p><strong>שם:</strong> <span id="confirmName"></span></p><p><strong>טלפון:</strong> <span id="confirmPhone"></span></p><p><strong>תאריך:</strong> <span id="confirmDate"></span></p><p><strong>שעה:</strong> <span id="confirmTime"></span></p><p style="margin-top:15px;font-size:14px">ממתינה לאישור — תקבל הודעה בוואטסאפ</p></div><div class="button-group"><button class="btn btn-primary" onclick="resetForm()">שיעור נוסף</button></div></div></div></div><div class="footer"><p>© 2026 The Club Lab · כל הזכויות שמורות</p></div><script>function goToStep2(){const n=document.getElementById('name').value;const p=document.getElementById('phone').value;if(!n||!p){alert('אנא מלא את כל השדות');return}document.getElementById('step1Form').classList.add('hidden');document.getElementById('step2Form').classList.remove('hidden')}function backToStep1(){document.getElementById('step2Form').classList.add('hidden');document.getElementById('step1Form').classList.remove('hidden')}function submitForm(){const n=document.getElementById('name').value;const p=document.getElementById('phone').value;const d=document.getElementById('date').value;const t=document.getElementById('time').value;if(!d||!t){alert('אנא בחר תאריך ושעה');return}document.getElementById('step2Form').classList.add('hidden');document.getElementById('confirmName').textContent=n;document.getElementById('confirmPhone').textContent=p;document.getElementById('confirmDate').textContent=d;document.getElementById('confirmTime').textContent=t;document.getElementById('successMsg').classList.remove('hidden');fetch('/api/appointments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,phone:p,date:d,time:t})}).catch(()=>{})}function resetForm(){document.getElementById('name').value='';document.getElementById('phone').value='';document.getElementById('date').value='';document.getElementById('time').value='';document.getElementById('successMsg').classList.add('hidden');document.getElementById('step1Form').classList.remove('hidden')}</script></body></html>
